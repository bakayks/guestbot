spring:
  application:
    name: guestbot

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/guestbot}
    username: ${DB_USER:guestbot_user}
    password: ${DB_PASSWORD:r4qZyb3UpLH2}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate  # Flyway управляет схемой
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20  # Помогает с N+1

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 50MB

server:
  port: 8080
  compression:
    enabled: true
  tomcat:
    threads:
      max: 200
      min-spare: 20

# JWT
jwt:
  secret: ${JWT_SECRET:a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2}
  access-token-expiry: 3600      # 1 hour in seconds
  refresh-token-expiry: 2592000  # 30 days in seconds

# Claude API
claude:
  api-key: ${CLAUDE_API_KEY:sk-ant-test}
  base-url: https://api.anthropic.com
  sonnet-model: claude-sonnet-4-20250514
  haiku-model: claude-haiku-4-5-20251001
  max-tokens: 1024
  cache-ttl: 3600  # 1 hour prompt cache

# Telegram
telegram:
  webhook-secret: ${TELEGRAM_WEBHOOK_SECRET:localsecret}

# MinIO
minio:
  url: ${MINIO_URL:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:password}
  bucket-hotels: guestbot-hotels
  bucket-rooms: guestbot-rooms

# Async thread pools
async:
  notification:
    core-pool-size: 5
    max-pool-size: 20
    queue-capacity: 100
  telegram:
    core-pool-size: 10
    max-pool-size: 50
    queue-capacity: 500

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# Logging
logging:
  level:
    com.guestbot: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# SpringDoc
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true

logging:
  level:
    com.guestbot: DEBUG
    org.hibernate.SQL: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false

logging:
  level:
    com.guestbot: INFO
